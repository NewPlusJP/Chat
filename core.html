<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NewPlusJP - Core Connection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Consolas', 'Monaco', monospace; background: #0a0c10; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { background: #161b22; padding: 15px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; }
    #chat-container { flex: 1; overflow-y: auto; padding: 20px; background: radial-gradient(circle at center, #111b27 0%, #0a0c10 100%); }
    .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 15px; }
    .sender { font-size: 12px; color: #58a6ff; margin-bottom: 4px; font-weight: bold; }
    .msg-bubble { padding: 10px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 14px; position: relative; }
    .other-msg { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; align-self: flex-start; }
    .my-msg { background: #238636; color: #ffffff; align-self: flex-end; }
    .input-area { background: #161b22; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
    input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; outline: none; }
    button { background: #238636; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:hover { background: #2ea043; }
  </style>
</head>
<body>
  <header>
    <div id="core-status" style="font-size: 1.1em;">Connecting to Core...</div>
  </header>

  <div id="chat-container"></div>

  <div class="input-area">
    <input type="text" id="user-name" placeholder="Name" style="width: 100px;">
    <input type="text" id="chat-input" placeholder="Message to Core..." style="flex: 1;">
    <button id="send-btn">SEND</button>
  </div>

  <script src="config.js"></script>
  <script src="core.js"></script>
</body>
</html>
